baseURL = 'https://coltonfouch.com/'
languageCode = 'en-us'
locale = 'en-us'
title = 'Colton Fouch'
theme = "nightfall"
enableRobotsTXT = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.header]]
    name = "~/about"
    weight = 0
    url = "/about"
  [[menu.header]]
    name = "~/resume"
    weight = 1
    url = "/resume"
  [[menu.header]]
    name = "~/blog"
    weight = 2
    url = "/blog"

[params]
user = "colton"
hostname = "coltonfouch.com"
sitedescription = "Platform Manager — MDM architect, endpoint strategist, and live production engineer based in Ventura, CA."
openLinksInNewTab = true
showMetadata = false
footerHtml = '© 2026 Colton Fouch · <a href="mailto:info@coltonfouch.com" class="footerLink">info@coltonfouch.com</a>'

  [params.og]
    image = "/images/profile.png"
    type = "website"

  [params.styles]
  color = "orange"

  [params.author]
    name = "Colton Fouch"
    email = "info@coltonfouch.com"

[[params.social]]
key = 0
name = "linkedin"
url = "https://linkedin.com/in/coltonfouch"
icon = "fa-brands fa-linkedin"
target = "_blank"
aria = "LinkedIn Profile"

[[params.social]]
key = 1
name = "email"
url = "mailto:info@coltonfouch.com"
icon = "fa-solid fa-envelope"
aria = "Email"
